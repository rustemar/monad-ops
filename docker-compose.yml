services:
  monad-ops:
    build: .
    restart: unless-stopped
    ports:
      # Bind to localhost only — dashboard exposes operational telemetry
      # (block IDs, retry%, contract labels). Front it with your own
      # reverse proxy + auth before opening publicly. To peek from your
      # laptop: `ssh -L 8873:127.0.0.1:8873 <node-host>`.
      - "127.0.0.1:8873:8873"
    extra_hosts:
      # Lets config.toml's rpc_url use http://host.docker.internal:8080
      # to reach the host's Monad RPC endpoint from inside the bridge.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./labels.json:/app/labels.json:ro
      - ./data:/app/data
      # journald access: monad-ops tails the host's monad-execution and
      # monad-bft units via `journalctl -u <unit> -f`. The container
      # needs the persistent journal directory + the host's machine-id
      # so journalctl resolves the right journal subdirectory.
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    # GID of the host's systemd-journal group — required for the
    # container process to read journal files. Distros differ:
    # Debian/Ubuntu = 101, RHEL/Fedora = 190. Override via .env:
    #   echo "SYSTEMD_JOURNAL_GID=$(getent group systemd-journal | cut -d: -f3)" > .env
    group_add:
      - "${SYSTEMD_JOURNAL_GID:-101}"
    environment:
      MONAD_OPS_CONFIG: /app/config.toml
